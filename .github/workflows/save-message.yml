name: Save message

on:
  workflow_dispatch:
    inputs:
      roomId:
        description: "Room ID"
        required: true
        type: string
      deviceId:
        description: "Device ID"
        required: true
        type: string
      text:
        description: "Message text"
        required: true
        type: string
      createdAt:
        description: "Created at (ISO8601)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create JSON file
        shell: bash
        run: |
          mkdir -p data/messages
          ts=$(date -u +"%Y%m%d_%H%M%S")
          short_device=$(echo "${{ inputs.deviceId }}" | cut -c1-4)
          filename="data/messages/${ts}_${short_device}.json"

          cat > "$filename" <<EOF
          {
            "roomId": "${{ inputs.roomId }}",
            "deviceId": "${{ inputs.deviceId }}",
            "text": "${{ inputs.text }}",
            "createdAt": "${{ inputs.createdAt }}"
          }
          EOF

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/messages
          git commit -m "Add message" || exit 0
          git push
