<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Input</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
    }
    textarea {
      width: 100%;
      height: 160px;
      font-size: 16px;
      box-sizing: border-box;
      padding: 12px;
    }
    button {
      margin-top: 12px;
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }
    #message {
      margin-top: 12px;
      color: green;
      font-weight: bold;
      min-height: 1.5em;
      white-space: pre-wrap;
    }
    #deviceInfo {
      margin-bottom: 12px;
      color: #555;
      font-size: 14px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>入力ページ</h1>

  <div id="deviceInfo"></div>

  <textarea id="textInput" placeholder="ここに入力してください"></textarea>
  <br />
  <button id="sendButton">送信</button>

  <div id="message"></div>

  <script>
    const textInput = document.getElementById("textInput");
    const sendButton = document.getElementById("sendButton");
    const message = document.getElementById("message");
    const deviceInfo = document.getElementById("deviceInfo");

    const params = new URLSearchParams(location.search);
    const roomId = params.get("room") || "survey001";

    let deviceId = localStorage.getItem("deviceId");
    if (!deviceId) {
      deviceId = crypto.randomUUID();
      localStorage.setItem("deviceId", deviceId);
    }

    deviceInfo.textContent = `roomId: ${roomId}\ndeviceId: ${deviceId}`;

    sendButton.addEventListener("click", () => {
      const text = textInput.value.trim();

      if (!text) {
        message.textContent = "テキストを入力してください。";
        message.style.color = "red";
        return;
      }

      const payload = {
        roomId,
        deviceId,
        text,
        createdAt: new Date().toISOString()
      };

      message.textContent = JSON.stringify(payload, null, 2);
      message.style.color = "green";
      textInput.value = "";
      textInput.focus();
    });
  </script>
</body>
</html>
